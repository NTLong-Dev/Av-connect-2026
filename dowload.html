<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
</head>

<body>

    <script>
        window.onload = function () {
            const link = document.createElement("a");
            link.href = "tai-lieu.pdf";
            link.download = "";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => {
                window.close();
            }, 500);
        };
    </script>

</body>

</html>
