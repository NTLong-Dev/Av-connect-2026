<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen iframe</title>

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 🔥 Lớp che logo */
        .hide-logo {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 160px;
            /* chỉnh lại nếu chưa khớp */
            height: 45px;
            background: linear-gradient(to left, #0e0a0a, #1b1616);
            /* đổi theo màu nền web */
            z-index: 9999;
        }
    </style>
</head>

<body>
    <iframe src="https://online.pubhtml5.com/njbds/lnre/" allowfullscreen>
    </iframe>
    <div class="hide-logo"></div>
</body>

</html>
